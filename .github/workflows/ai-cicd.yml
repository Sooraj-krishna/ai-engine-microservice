name: AI Engine CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  push:
    branches:
      - main

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.10'

jobs:
  # Phase 1: Automated Testing on PR Creation
  test-ai-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black isort safety bandit
          
      - name: Code quality checks
        run: |
          # Format check
          black --check .
          # Import sorting check  
          isort --check-only .
          # Linting
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Security check
          bandit -r . -f json -o bandit-report.json || true
          safety check --json --output safety-report.json || true
          
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml
          
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            bandit-report.json
            safety-report.json
            coverage.xml
            
  # Phase 2: Build and validate application
  build-validation:
    runs-on: ubuntu-latest
    needs: test-ai-changes
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: |
          docker build -t ai-engine:test .
          
      - name: Test container startup
        run: |
          docker run --rm -d --name ai-engine-test -p 8000:8000 ai-engine:test
          sleep 10
          # Test if application starts correctly
          curl -f http://localhost:8000/ || exit 1
          docker stop ai-engine-test
          
      - name: Integration tests
        run: |
          # Run integration tests here
          echo "Running integration tests..."
          # Example: Test AI API connectivity, GitHub API access, etc.
          
  # Phase 3: Deploy to Staging after PR Approval
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test-ai-changes, build-validation]
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    environment:
      name: staging
      url: https://your-staging-url.com
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: Deploy to Railway, Render, or other staging environment
          
      - name: Run staging smoke tests
        run: |
          sleep 30  # Wait for deployment to complete
          # Test critical functionality in staging
          curl -f https://your-staging-url.com/
          # Add more smoke tests
          
      - name: Notify deployment success
        run: |
          echo "Staging deployment successful! Ready for production approval."
          
  # Phase 4: Production Deployment after merge to main
  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-production-url.com
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production
        env:
          # Add your production deployment secrets
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          echo "Deploying to production..."
          # Example deployment commands:
          # curl -X POST -H "Authorization: Bearer $DEPLOY_KEY" \
          #   "$PROD_URL/deploy" -d '{"ref": "'$GITHUB_SHA'"}'
          
      - name: Production health check
        run: |
          sleep 60  # Wait for deployment
          # Comprehensive health checks
          curl -f https://your-production-url.com/
          # Test AI engine functionality
          # curl -f https://your-production-url.com/run
          
      - name: Notify deployment
        run: |
          echo "Production deployment completed successfully!"
